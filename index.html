<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Регистрация</title>

<style>
body {
  font-family: Arial;
}
.container {
  width: 400px;
  margin: 50px auto;
  border: 1px solid #ccc;
  padding: 20px;
}
h3 {
  text-align: center;
}
table {
  width: 100%;
}
td {
  padding: 5px;
}
.required {
  color: red;
}
</style>

<script>
function CheckData() {

  var name = document.getElementById("name").value;
  var org = document.getElementById("org").value;
  var phone = document.getElementById("phone").value;
  var email = document.getElementById("email").value;

  if(name.length == 0 || org.length == 0 || phone.length == 0 || email.length == 0){
    alert("Заполните все поля!");
    return;
  }

  var namePattern = /^[A-Za-zА-Яа-яЁё\s]+$/;
  if(!namePattern.test(name)){
    alert("Имя должно содержать только буквы!");
    return;
  }

  var emailPattern = /^[\.\-_A-Za-z0-9]+@[\.\-A-Za-z0-9]+\.[A-Za-z0-9]{2,6}$/;
  if(!emailPattern.test(email)){
    alert("Неверный email!");
    return;
  }

  var phonePattern = /^\+?[0-9]{10,12}$/;
  if(!phonePattern.test(phone)){
    alert("Телефон должен содержать 10–12 цифр!");
    return;
  }

  var ans = confirm("Вы уверены, что хотите отправить введенные данные?");
  if(ans){
    document.forms[0].submit();
  }

}
</script>

</head>

<body>

<div class="container">

<h3>Для регистрации необходимо указать ваши персональные данные</h3>

<form onsubmit="CheckData(); return false;">

<table>

<tr>
<td><span class="required">*</span> Имя</td>
<td><input type="text" id="name"></td>
</tr>

<tr>
<td>Организация (компания)</td>
<td><input type="text" id="org"></td>
</tr>

<tr>
<td>Телефон</td>
<td><input type="text" id="phone"></td>
</tr>

<tr>
<td><span class="required">*</span> Адрес эл.почты</td>
<td><input type="text" id="email"></td>
</tr>

<tr>
<td colspan="2" align="center">
<input type="submit" value="Отправить">
<input type="reset" value="Очистить">
</td>
</tr>

</table>

</form>

<p><span class="required">*</span> Поля обязательные для заполнения</p>

</div>

</body>
</html>
